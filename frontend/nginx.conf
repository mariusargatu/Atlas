# Serve the built SPA and proxy the API. The browser only ever talks to nginx (same origin), so
# there is no CORS hop and the bearer cookie stays first-party. /api/* is rewritten to the backend.
server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html; # client-side routing (TanStack Router)
    }
}
