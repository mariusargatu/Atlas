name: ci

# SP10 task 1: this workflow was inherited from prod-hardening and never revisited across SP1
# through SP9. Reviewed now against the CURRENT suite (2072 hermetic tests, the matrix and load
# lanes own hermetic coverage, SP9's trace contract bump from 1.2.0 to 1.3.0): no change was
# needed. `lint`, `test` (mirrored below as two pytest runs so the second run can prove byte
# stability), and `web-test` (mirrored in web-gate) are all still real Taskfile.yml targets
# (testing/tests/test_ci_workflow_targets.py asserts this and catches drift if a mirrored command
# ever goes stale); the `record` dependency group still installs nothing under a plain `uv sync`
# or `uv run`, so a fresh worktree stays keyless. Verified locally in an isolated worktree; this
# is not the same claim as a run observed on GitHub, and this file stays dormant until a
# maintainer pushes, the same posture janitor.yml and release.yml already carry.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs (a new push obsoletes the old one), but NEVER cancel a push to main:
  # main runs are the byte-stability record and each commit's result must stand on its own.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# The hermetic PR lane. No API keys are provided and the `record` dependency group is not
# installed, so there is no provider client to make a live call — a cassette miss hard-fails
# instead. The matrix runs the SAME committed cassettes on x86_64 (ubuntu) and arm64 (macOS):
# if a run is not byte-stable across architectures, the determinism thesis is broken and this
# job is the place it fails loudly.
jobs:
  hermetic-pr-lane:
    name: hermetic PR lane (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (and Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Lint (ruff, config in pyproject [tool.ruff])
        run: task lint

      - name: Run the deterministic, replayed suite (no keys, no live calls)
        env:
          TZ: UTC
          LC_ALL: C
          PYTHONHASHSEED: "0"
          OMP_NUM_THREADS: "1"
        run: uv run pytest -q

      - name: Re-run to prove byte-stability (a flake here means broken determinism)
        env:
          TZ: UTC
          LC_ALL: C
          PYTHONHASHSEED: "0"
          OMP_NUM_THREADS: "1"
        run: uv run pytest -q

  # The frontend deterministic gate. Generated API client must match the OpenAPI contract (drift
  # fails the build — the single-source-of-truth invariant, ADR-028).
  web-gate:
    name: web gate (lint · typecheck · test · knip · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: codegen drift (generated client must equal the committed contract)
        run: pnpm -C frontend codegen && git diff --exit-code frontend/src/api/generated
      - run: pnpm -C frontend lint
      - run: pnpm -C frontend typecheck
      - run: pnpm -C frontend test
      - run: pnpm -C frontend knip
      - run: pnpm -C frontend build

  # End-to-end against the REPLAYED backend (atlas.server, committed cassettes) — no keys, no live
  # calls. Playwright boots Vite via its webServer; this job boots the FastAPI edge on :8000.
  e2e:
    name: e2e (Playwright · replay backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C frontend exec playwright install --with-deps chromium
      - name: Boot the replay backend on :8000
        env:
          TZ: UTC
          LC_ALL: C
          PYTHONHASHSEED: "0"
          OMP_NUM_THREADS: "1"
          PYTHONPATH: backend:testing/harness:.
        run: |
          uv run uvicorn atlas.server:app --port 8000 > backend-boot.log 2>&1 &
          for _ in $(seq 1 30); do
            curl -sf localhost:8000/healthz >/dev/null && exit 0
            sleep 1
          done
          echo "backend never became ready on :8000" >&2
          cat backend-boot.log
          exit 1
      - name: Run Playwright (Vite started by its webServer)
        run: pnpm -C frontend e2e

  # Security scanning is cheap insurance (learnings KEEP). Trivy FS for deps/secrets; CodeQL lives
  # in codeql.yml.
  security:
    name: security (Trivy FS)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
