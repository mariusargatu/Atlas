receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  redaction:
    allow_all_keys: false
    allowed_keys:
      - atlas.config.hash
      - atlas.contract.dataset_version
      - atlas.contract.manifest_version
      - atlas.contract.sse_version
      - atlas.contract.trace_version
      - atlas.corpus.version
      - atlas.cost.input_tokens
      - atlas.cost.output_tokens
      - atlas.cost.usd
      - atlas.degradation.mode
      - atlas.guard.decision
      - atlas.index.build_id
      - atlas.judge.id
      - atlas.judge.rubric_version
      - atlas.judge.verdict
      - atlas.privacy.content_captured
      - atlas.privacy.redaction_policy_version
      - atlas.privacy.synthetic
      - atlas.rerank.scores_post
      - atlas.rerank.scores_pre
      - atlas.retrieval.doc_ids
      - atlas.semconv.version
      - atlas.stage.assemble_ms
      - atlas.stage.embed_ms
      - atlas.stage.rerank_ms
      - atlas.stage.retrieve_ms
      - atlas.stage.ttft_ms
      - atlas.subject.pseudonym
      - atlas.turn.seq
      - atlas.variant
      - gen_ai.request.model
      - openinference.span.kind
    ignored_keys: []
    summary: debug

exporters:
  otlp/phoenix:
    endpoint: phoenix:4317
    tls:
      insecure: true
  file/raw_archive:
    path: /var/log/otel/raw-otlp-archive.jsonl
    format: json

  # D13: LangSmith and LangWatch exist only as commented configuration here, proving pluggability
  # without ever being a live export target. This plan's Global Constraints: neither package/SDK may
  # ever appear in pyproject.toml; a Go binary's own YAML is the only place either name may appear
  # at all.
  # otlphttp/langsmith:
  #   endpoint: https://api.smith.langchain.com/otel/v1/traces
  #   headers:
  #     x-api-key: ${LANGSMITH_API_KEY}
  #     Langsmith-Project: atlas
  # otlphttp/langwatch:
  #   endpoint: https://app.langwatch.ai/api/otel/v1/traces
  #   headers:
  #     Authorization: Bearer ${LANGWATCH_API_KEY}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [redaction]
      exporters: [otlp/phoenix, file/raw_archive]
      # LangSmith/LangWatch stay out of this list too: adding either here would be the actual
      # pluggability step, deliberately not taken (D13: Phoenix is the only DEPLOYED backend).
