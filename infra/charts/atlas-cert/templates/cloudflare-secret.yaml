{{- /* cert-manager's own documented rule: a ClusterIssuer's secretRef resolves against the
CONTROLLER's cluster resource namespace (its own --cluster-resource-namespace flag, defaulted to
"cert-manager" by the operator infra/tofu/cluster's kube-hetzner module installs), not the namespace
of anything requesting a Certificate. This Secret therefore lives in "cert-manager", not
.Values.namespace ("atlas"), on purpose -- getting this wrong is the single most common cert-manager
DNS-01 misconfiguration, so it is asserted directly by the render test, not left to be discovered
live against a real burst cluster. */ -}}
{{- if .Values.certManager.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: atlas-cloudflare-api-token
  namespace: cert-manager
type: Opaque
stringData:
  api-token: {{ .Values.certManager.cloudflareApiToken | quote }}
{{- end }}
