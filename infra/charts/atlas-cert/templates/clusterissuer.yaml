{{- /* D3: "one wildcard cert via cert-manager DNS-01, persisted as a secret across teardowns." DNS-01
(not HTTP-01) is the only challenge type that can prove ownership of a WILDCARD name at all (a
single HTTP-01 challenge can only prove one concrete hostname); Cloudflare is the solver because the
durable state plane (infra/README.md's R2 section) already standardizes on Cloudflare for R2, one
provider account instead of two. ClusterIssuer, not a namespaced Issuer: the same issuer serves both
the atlas-cert Certificate below and any future burst only workload that needs a cert, without a
second copy of this resource per namespace. */ -}}
{{- if .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: atlas-letsencrypt-dns01
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ .Values.certManager.acmeEmail | quote }}
    privateKeySecretRef:
      name: atlas-acme-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: atlas-cloudflare-api-token
              key: api-token
{{- end }}
