{{- /* Only rendered where a postgres password is actually configured: local today (fake, proving
the SOPS mechanism), burst once a future task wires its own secrets.enc.yaml (a named open gap in
infra/README.md's "What Task 5 deliberately does not do" list; burst's cnpg-cluster, Jobs, and
backend all reference this Secret by name, so a real burst bringup needs it first). Absent
entirely for burst today, by design, not by omission.

Task 2 folds in a `username` key (default "atlas", matching compose's POSTGRES_USER) so this same
Secret doubles as CNPG's `bootstrap.initdb.secret` (infra/charts/cnpg-cluster/templates/cluster.
yaml), which needs both `username` and `password` keys. Kept as one Secret rather than a second,
redundant one, per the Task 1 report's own note that folding in was an option at this task's
judgment. */ -}}
{{- if .Values.postgres }}
apiVersion: v1
kind: Secret
metadata:
  name: atlas-postgres-credentials
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  username: {{ .Values.postgres.username | default "atlas" | quote }}
  password: {{ .Values.postgres.password | quote }}
{{- end }}
