{{- /* D29: "one webhook receiver, no other channels." A single route matching every alert to the
single receiver below -- there is deliberately no second receiver, no severity based routing tree:
"deterministic paging" (D29's own phrase) means every alert this release can ever raise pages the
same one place, not a triage tree this reference system has no on call rotation to justify.

Fix round 1 (SP6 Task 5 review, Minor finding 2): this object carries no credential today, only the
webhook URL (values.yaml's own placeholder), so a ConfigMap would represent that just as honestly.
Kept as a Secret on purpose: a real deployment's SOPS override (values.yaml's own comment above)
lands a real receiver's credential in this exact same stringData block, and that override should not
also have to change the object kind to work. */ -}}
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  alertmanager.yml: |
    route:
      receiver: atlas-webhook
    receivers:
      - name: atlas-webhook
        webhook_configs:
          - url: {{ .Values.alertmanager.webhookUrl | quote }}
