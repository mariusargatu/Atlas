# Atlas, single entrypoint (Task · https://taskfile.dev). The PR lane (`task test`) needs NO keys
# and NO network. The determinism env is pinned globally so a clone reproduces byte for byte
# (ADR-007). Run `task --list` to see everything.
version: '3'

env:
  TZ: UTC
  LC_ALL: C
  PYTHONHASHSEED: '0'
  OMP_NUM_THREADS: '1'
  PYTHONPATH: backend:testing/harness:.
  DEEPEVAL_TELEMETRY_OPT_OUT: 'YES'   # deepeval phones home on every measure(); no lane may egress telemetry

tasks:
  install:
    desc: Sync the Python toolchain (uv).
    cmds:
      - uv sync

  up:
    desc: (no op) the v0.1 spine needs no external infra.
    cmds:
      - echo "v0.1 spine needs no external infra. Run 'task test'."

  test:
    desc: Hermetic, deterministic regression lane, byte stable, no keys, no network.
    cmds:
      - uv run pytest -q

  cov:
    desc: Honest coverage over CI reachable code (omit list lives in pyproject [tool.coverage]).
    cmds:
      - uv run pytest -q --cov --cov-report=term-missing

  record:
    desc: Capture new cassettes against live models (needs keys; not the PR lane).
    env:
      RECORD: '1'
    cmds:
      - uv run --all-groups pytest -q

  record-demo:
    desc: Prove record → replay against a live provider (MODEL_PROVIDER in .env; default local Ollama).
    cmds:
      - uv run --all-groups python testing/harness/recording/record_turn.py

  record-atlas:
    desc: Record the real Atlas cold open cassette (replayed by testing/tests/test_recorded_turns.py).
    cmds:
      - uv run --all-groups python testing/harness/recording/record_atlas_cassettes.py

  seed-e2e:
    desc: Regenerate the committed cassettes the Playwright E2E lane replays.
    cmds:
      - uv run python testing/harness/recording/seed_e2e_cassettes.py

  serve-e2e:
    desc: Serve the product API against the replayed gateway (no keys, no live calls), the E2E backend.
    cmds:
      - uv run uvicorn atlas.server:app --port 8000

  web-test:
    desc: The frontend deterministic gate (mirrors the web CI job).
    dir: frontend
    cmds:
      - pnpm install --frozen-lockfile
      - pnpm codegen
      - git diff --exit-code src/api/generated
      - pnpm lint
      - pnpm typecheck
      - pnpm test
      - pnpm knip
      - pnpm build

  eval:
    desc: eval lane (multi-trial, scored, with Wilson CIs). REPLAY demo here; LIVE nightly is P5+.
    cmds:
      - PYTHONPATH=backend:testing/harness:. uv run python -m evals.evalkit

  rageval:
    desc: "RAG eval lane (Option A): DeepEval's LLM-judged RAG metrics with a pinned local Ollama judge, NON-gating. Needs the rageval group + Ollama; never the PR lane."
    cmds:
      - uv run --group rageval python -m evals.rageval

  ragset:
    desc: "synthetic RAG set generation: DeepEval Synthesizer over the corpus, frozen to JSONL for human review. Needs the rageval group + Ollama."
    cmds:
      - uv run --group rageval python -m evals.ragset

  graph:
    desc: "graph-RAG study: does the graph beat vector on the relational slice? Deterministic over the in-memory adapters (no DB needed to make the point)."
    cmds:
      - PYTHONPATH=backend:testing/harness:. uv run python -m evals.graphrag

  graph-up:
    desc: "Start the operator Neo4j (compose profile 'operator'); the app/E2E lane never starts it. Then the graph study can run against a live DB."
    cmds:
      - docker compose --profile operator up -d neo4j

  monitor:
    desc: "production-monitoring sketch: the deterministic slice (call budget + read-surface breach) as a trend; online judge / OTel / Langfuse are the deferred prod lane."
    cmds:
      - PYTHONPATH=backend:testing/harness:. uv run python -m evals.monitor

  mutation:
    desc: "semantic mutation lane: report the frozen realistic-mutant kill rate over the IR metrics (deterministic), then hand off to an LLM to generate + promote new survivors."
    cmds:
      - PYTHONPATH=backend:testing/harness:. uv run python -m evals.mutation

  metamorphic:
    desc: "metamorphic augmentation lane: show the frozen paraphrase family + the guard invariant, then hand off to an LLM to propose new paraphrases to review, freeze, and replay."
    cmds:
      - PYTHONPATH=backend:testing/harness:. uv run python -m evals.metamorphic

  trajectory:
    desc: "agent-trajectory lane (deterministic): grade the trajectory over a REAL replayed atlas_graph run (no keys, no egress). The judged agentic view is `task trajectory-judge`."
    cmds:
      - PYTHONPATH=backend:testing/harness:. uv run python -m evals.trajectory

  trajectory-judge:
    desc: "agent-trajectory JUDGED view (operator, non-gating): the replayed run graded by DeepEval ToolCorrectness (deterministic) + TaskCompletion, REPLAYING a frozen live judge verdict (deterministic, no egress). Capture/refresh it with `task trajectory-record`."
    cmds:
      - uv run --group rageval python -m evals.trajectory --judge

  trajectory-record:
    desc: "capture LIVE TaskCompletion verdicts (Ollama if up, else OpenAI) over the replayed runs and FREEZE them to replayable cassettes. Needs the rageval group + a judge; loads .env if present (the Ollama path needs no key). Run once; then `task trajectory-judge` replays with no egress."
    dotenv: ['.env']
    cmds:
      - uv run --group rageval python -m evals.trajectory --record

  redteam:
    desc: "red team lane (OWASP/ATLAS): re-verifies the poison corpus invariant, hands off to DeepTeam for live generation when the redteam group is installed. Non-gating."
    cmds:
      - PYTHONPATH=backend:testing/harness:. uv run python -m evals.redteam

  drift:
    desc: drift lane (spike) — diff DECISIONS old-vs-new behind a stable request key. REPLAY demo; live shadow re-record deferred.
    cmds:
      - PYTHONPATH=backend:testing/harness:. uv run python -m evals.drift

  oracle:
    desc: differential oracle (spike) — grade inference-truth via two independent derivations, not a stored column.
    cmds:
      - PYTHONPATH=backend:testing/harness:. uv run python -m evals.inference_oracle

  judge:
    desc: judge calibration — a cross-family judge scored against human labels; one rubric fix moves Cohen's k from ~0.29 to ~0.85. REPLAY, no keys.
    cmds:
      - PYTHONPATH=backend:testing/harness:. uv run python -m evals.judge

  judge-live:
    desc: LIVE judge-calibration probe — real model, real account facts, real cost. Sweeps OpenAI tiers cheapest-first (needs OPENAI_API_KEY, egress; never the PR lane).
    cmds:
      - PYTHONPATH=backend:testing/harness:. uv run --all-groups --env-file .env python testing/harness/evals/judge/live_calibration.py

  benchmark:
    desc: "honest benchmark study: the regression that wasn't. 84 vs 81 on n=100 with overlapping CIs and a paired test (p~0.55). No keys, seeded, reproducible."
    cmds:
      - PYTHONPATH=backend:testing/harness:. uv run python -m evals.benchmark
