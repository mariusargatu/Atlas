[alembic]
# script_location resolves relative to THIS file (alembic >=1.13's %(here)s token), so `task
# db:upgrade` and the compose one shot migration service both work regardless of the caller's cwd.
script_location = %(here)s

# No sqlalchemy.url here on purpose: env.py reads ATLAS_PG_DSN and refuses to run with a worded
# error when it is unset, so a connection string never lands in version control (see env.py).

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
